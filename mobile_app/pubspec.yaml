name: nutribot
description: AI Food Nutrition & Disease Risk Prediction Chatbot
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # 🌐 Networking
  http: ^1.1.0

  # 📷 Image Handling
  image_picker: ^1.0.4
  flutter_image_compress: ^2.3.0

  # 💾 Local Storage
  shared_preferences: ^2.2.2

  # 🔐 Hashing (if needed)
  crypto: ^3.0.3

  # 🔥 Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0

  # 🧠 State Management
  provider: ^6.1.1

  # 🎨 UI Enhancements
  google_fonts: ^8.0.2
  smooth_page_indicator: ^2.0.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
